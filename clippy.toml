# Clippy configuration. MSRV is set here so lints that depend on toolchain
# capability do not fire on features unavailable in the supported floor.
# The concrete MSRV is confirmed at M0 kickoff and documented in
# docs/DISCIPLINES.md.
msrv = "1.94"

# Proper nouns / acronyms that should not trigger `clippy::doc_markdown`.
doc-valid-idents = [
    "BitTorrent",
    "..",      # keep clippy's default allowlist
]

# Disallow methods/paths prone to subtle bugs. Populated as we discover them.
# disallowed-methods = []
# disallowed-types = []
