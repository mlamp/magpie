name: Nightly

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fuzz targets live in per-crate `crates/<name>/fuzz` dirs (standard
  # cargo-fuzz layout). The matrix's `crate` selects which `cargo fuzz`
  # working directory to use; `target` is the fuzz-target binary name.
  # See docs/DISCIPLINES.md for the ≥10 min-per-target cadence bar.
  fuzz:
    name: cargo-fuzz (${{ matrix.crate }}::${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - crate: magpie-bt-bencode
            target: bencode
          - crate: magpie-bt-metainfo
            target: metainfo
          - crate: magpie-bt-wire
            target: handshake_decode
          - crate: magpie-bt-wire
            target: wire_decode
          - crate: magpie-bt-wire
            target: extension_handshake
          - crate: magpie-bt-core
            target: alert_ring
          - crate: magpie-bt-core
            target: udp_tracker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Run fuzz target
        working-directory: crates/${{ matrix.crate }}
        run: cargo fuzz run ${{ matrix.target }} -- -max_total_time=600

  miri:
    name: miri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: miri test
        run: cargo miri test --workspace --lib

  # Open (or comment on) a tracking issue when a SCHEDULED run fails, so a
  # red nightly turns into a notification rather than a silent badge.
  # Manual `workflow_dispatch` reruns are exempt — they're for verifying
  # fixes and shouldn't file issues.
  notify-on-failure:
    name: Notify on scheduled failure
    needs: [fuzz, miri]
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open or update tracking issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_ID: ${{ github.run_id }}
          TITLE: "Nightly is red (auto-filed)"
        run: |
          set -euo pipefail
          failed=$(gh run view "$RUN_ID" --repo "$REPO" --json jobs \
            --jq '[.jobs[] | select(.conclusion == "failure") | "- \(.name)"] | join("\n")')
          [ -z "$failed" ] && failed="- (job list unavailable; see run page)"
          existing=$(gh issue list --repo "$REPO" --state open \
            --search "in:title \"$TITLE\"" --json number --jq '.[0].number // ""')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$REPO" --body \
              "Nightly failed again — $RUN_URL"$'\n\nFailed jobs:\n'"$failed"
          else
            gh issue create --repo "$REPO" --title "$TITLE" --body \
              "The scheduled nightly workflow failed."$'\n\n'"Latest failing run: $RUN_URL"$'\n\nFailed jobs:\n'"$failed"$'\n\nAuto-filed by `.github/workflows/nightly.yml`. Triage the failing job(s), push a fix, then close this issue once the next scheduled nightly is green.'
          fi
