name: Nightly

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fuzz targets live in per-crate `crates/<name>/fuzz` dirs (standard
  # cargo-fuzz layout). The matrix's `crate` selects which `cargo fuzz`
  # working directory to use; `target` is the fuzz-target binary name.
  # See docs/DISCIPLINES.md for the ≥10 min-per-target cadence bar.
  fuzz:
    name: cargo-fuzz (${{ matrix.crate }}::${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - crate: magpie-bt-bencode
            target: bencode
          - crate: magpie-bt-metainfo
            target: metainfo
          - crate: magpie-bt-wire
            target: handshake_decode
          - crate: magpie-bt-wire
            target: wire_decode
          - crate: magpie-bt-wire
            target: extension_handshake
          - crate: magpie-bt-core
            target: alert_ring
          - crate: magpie-bt-core
            target: udp_tracker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Run fuzz target
        working-directory: crates/${{ matrix.crate }}
        run: cargo fuzz run ${{ matrix.target }} -- -max_total_time=600

  miri:
    name: miri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: miri test
        run: cargo miri test --workspace --lib
