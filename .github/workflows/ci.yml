name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  preflight:
    name: Preflight (workspace present?)
    runs-on: ubuntu-latest
    outputs:
      has_workspace: ${{ steps.check.outputs.has_workspace }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -f Cargo.toml ]; then
            echo "has_workspace=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_workspace=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Cargo.toml yet — skipping Rust jobs until M0 creates the workspace."
          fi

  fmt:
    name: rustfmt
    needs: preflight
    if: needs.preflight.outputs.has_workspace == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    needs: preflight
    if: needs.preflight.outputs.has_workspace == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }})
    needs: preflight
    if: needs.preflight.outputs.has_workspace == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features --no-fail-fast

  doc:
    name: rustdoc
    needs: preflight
    if: needs.preflight.outputs.has_workspace == 'true'
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --all-features

  deny:
    name: cargo-deny
    needs: preflight
    if: needs.preflight.outputs.has_workspace == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  coverage:
    name: coverage
    needs: preflight
    if: needs.preflight.outputs.has_workspace == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info
      - name: Enforce thresholds
        # Thresholds per docs/DISCIPLINES.md target ≥85% overall.
        # Temporarily lowered to 0 during pre-M0 while crates are empty
        # scaffolds; re-raise to 85 at M0 gate (see 000-foundations.md).
        run: cargo llvm-cov report --fail-under-lines 0
      - uses: actions/upload-artifact@v4
        with:
          name: lcov
          path: lcov.info
