# Interop scenario: magpie seeds → Transmission leech.
# Same shape as docker-compose.qbittorrent.yml. Transmission is a
# second third-party target because its handshake reserved-bit
# tolerance historically differs from qBittorrent's; proving both
# gives higher confidence that magpie isn't relying on a single
# client's permissive parser.

services:
  fixture:
    build:
      context: ../..
      dockerfile: ci/interop/Dockerfile.magpie
    image: magpie-interop:latest
    command: generate_fixture
    environment:
      FIXTURE_OUT_DIR: /shared
      FIXTURE_ANNOUNCE: http://tracker:6969/announce
      FIXTURE_NAME: interop.bin
      FIXTURE_PIECE_COUNT: 320
    volumes:
      - shared:/shared

  tracker:
    image: magpie-interop:latest
    depends_on:
      fixture:
        condition: service_completed_successfully
    command: mock_tracker
    environment:
      MOCK_TRACKER_PORT: "6969"
      MOCK_TRACKER_PEERS: "${SEEDER_IP:-10.89.0.10}:6881"
    networks:
      default:
        ipv4_address: 10.89.0.20
    expose:
      - "6969"

  seeder:
    image: magpie-interop:latest
    depends_on:
      fixture:
        condition: service_completed_successfully
    command:
      - magpie-seeder
      - --torrent
      - /shared/fixture.torrent
      - --data
      - /shared/fixture.bin
      - --listen
      - 0.0.0.0:6881
      - --stats-dir
      - /shared/stats
      - --flush-secs
      - "2"
    volumes:
      - shared:/shared
    networks:
      default:
        ipv4_address: 10.89.0.10
    expose:
      - "6881"

  leech:
    image: linuxserver/transmission:4.0.6
    depends_on:
      tracker:
        condition: service_started
      seeder:
        condition: service_started
    environment:
      PUID: "1000"
      PGID: "1000"
      USER: "admin"
      PASS: "admin"
    volumes:
      - shared:/shared:ro
      - ./transmission-config:/config
      - leech-downloads:/downloads
    # Publish RPC port so `gate_transmission.sh` on the host can drive
    # the torrent-add + torrent-get poll flow.
    ports:
      - "127.0.0.1:9091:9091"
    networks:
      default:
        ipv4_address: 10.89.0.30

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 10.89.0.0/24

volumes:
  shared:
  leech-downloads:
