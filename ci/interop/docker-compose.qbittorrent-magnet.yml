# Interop scenario (magnet variant): magpie seeds + serves ut_metadata
# (BEP 9) → qBittorrent leech bootstraps from a magnet:?xt=...&tr=... URI
# rather than a .torrent file.
#
# Same shape as docker-compose.qbittorrent.yml; the only differences:
#
#   - The fixture step also writes /shared/fixture.magnet (the magnet URI).
#   - The seeder runs with `--advertise-metadata` so its BEP 10 extension
#     handshake exposes `metadata_size` and serves ut_metadata Data
#     responses on request.
#   - gate_qbittorrent_magnet.sh feeds the magnet URI to the qBittorrent
#     webUI via /api/v2/torrents/add `urls=` instead of uploading a file.
#
# qBittorrent's magnet add waits for metadata before any pieces transfer;
# this verifies BEP 9 + BEP 10 interop end-to-end.

services:
  fixture:
    build:
      context: ../..
      dockerfile: ci/interop/Dockerfile.magpie
    image: magpie-interop:latest
    command: generate_fixture
    environment:
      FIXTURE_OUT_DIR: /shared
      FIXTURE_ANNOUNCE: http://tracker:6969/announce
      FIXTURE_NAME: interop.bin
      FIXTURE_PIECE_COUNT: 320
    volumes:
      - shared:/shared

  tracker:
    image: magpie-interop:latest
    depends_on:
      fixture:
        condition: service_completed_successfully
    command: mock_tracker
    environment:
      MOCK_TRACKER_PORT: "6969"
      MOCK_TRACKER_PEERS: "${SEEDER_IP:-10.90.0.10}:6881"
    networks:
      default:
        ipv4_address: 10.90.0.20
    expose:
      - "6969"

  seeder:
    image: magpie-interop:latest
    depends_on:
      fixture:
        condition: service_completed_successfully
    command:
      - magpie-seeder
      - --torrent
      - /shared/fixture.torrent
      - --data
      - /shared/fixture.bin
      - --listen
      - 0.0.0.0:6881
      - --advertise-metadata
      - --stats-dir
      - /shared/stats
      - --flush-secs
      - "2"
    volumes:
      - shared:/shared
    networks:
      default:
        ipv4_address: 10.90.0.10
    expose:
      - "6881"

  leech:
    image: linuxserver/qbittorrent:4.5.5
    depends_on:
      tracker:
        condition: service_started
      seeder:
        condition: service_started
    environment:
      PUID: "1000"
      PGID: "1000"
      WEBUI_PORT: "8080"
    volumes:
      - shared:/shared:ro
      - ./qbittorrent-config:/config
      - leech-downloads:/downloads
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      default:
        ipv4_address: 10.90.0.30

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 10.90.0.0/24

volumes:
  shared:
  leech-downloads:
